apiVersion: apps/v1
kind: Deployment
metadata:
  name: omnigent
  labels:
    app: omnigent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: omnigent
  template:
    metadata:
      labels:
        app: omnigent
    spec:
      containers:
        - name: omnigent
          image: ghcr.io/omnigent-ai/omnigent-server:latest
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: omnigent-config
            - secretRef:
                name: omnigent-secrets
          volumeMounts:
            - name: artifacts
              mountPath: /data/artifacts
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: omnigent-artifacts
